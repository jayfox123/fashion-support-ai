<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXE Fashion — Customer Support</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="chat-container">
        <div id="chat-header">
            <h1>LUXE Fashion</h1>
            <p>Customer Support</p>
            <div id="agent-indicator">● Online — Ready to help</div>
        </div>

        <div id="chat-window">
            <div id="messages"></div>
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="How can we help you today?" />
            <button id="send-button">&#8593;</button>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
